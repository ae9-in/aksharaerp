<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akshara ERP</title>
  <link rel="icon" type="image/png" href="AksharaLogo.png?v=1">
  <link rel="shortcut icon" href="AksharaLogo.png?v=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Manrope:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #13222b;
      --paper: #fffefb;
      --soft: #f7f3ea;
      --accent-a: #f97316;
      --accent-b: #06b6d4;
      --accent-c: #facc15;
      --glass: rgba(255, 255, 255, 0.72);
      --line: rgba(19, 34, 43, 0.15);
      --shadow: 0 26px 60px rgba(40, 34, 24, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Manrope", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, rgba(6, 182, 212, 0.28), transparent 34%),
        radial-gradient(circle at 86% 18%, rgba(249, 115, 22, 0.26), transparent 36%),
        radial-gradient(circle at 60% 75%, rgba(250, 204, 21, 0.22), transparent 45%),
        linear-gradient(145deg, #fff7ea 0%, #fffef9 52%, #effcff 100%);
      overflow: hidden;
      position: relative;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.3;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 90%);
      animation: drift 18s linear infinite;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(2px);
      mix-blend-mode: multiply;
      pointer-events: none;
    }

    .orb-a {
      width: 220px;
      aspect-ratio: 1;
      background: color-mix(in oklab, var(--accent-a) 54%, white);
      top: 8%;
      left: 8%;
      animation: floatA 10s ease-in-out infinite;
    }

    .orb-b {
      width: 280px;
      aspect-ratio: 1;
      background: color-mix(in oklab, var(--accent-b) 56%, white);
      right: 9%;
      bottom: 10%;
      animation: floatB 12s ease-in-out infinite;
    }

    .shell {
      width: min(880px, 100%);
      border: 1px solid rgba(19, 34, 43, 0.16);
      border-radius: 28px;
      background: var(--glass);
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
      position: relative;
      isolation: isolate;
      overflow: hidden;
      animation: riseIn 850ms cubic-bezier(.21,.95,.34,1) both;
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(249,115,22,0.2), transparent 35%),
        linear-gradient(300deg, rgba(6,182,212,0.18), transparent 40%);
      z-index: -1;
      animation: pulseWash 5.8s ease-in-out infinite;
    }

    .content {
      display: grid;
      gap: 22px;
      padding: clamp(28px, 5vw, 54px);
      text-align: center;
    }

    .eyebrow {
      justify-self: center;
      padding: 10px 20px;
      border: 1px solid rgba(19, 34, 43, 0.2);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: clamp(1rem, 2.8vw, 1.6rem);
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.75);
      animation: fadeUp 700ms 120ms both;
    }

    h1 {
      font-family: "Syne", sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 5.8vw, 4.3rem);
      line-height: 0.95;
      letter-spacing: -0.02em;
      animation: fadeUp 780ms 240ms both;
    }

    .subtitle {
      font-size: clamp(0.98rem, 2.2vw, 1.2rem);
      max-width: 56ch;
      justify-self: center;
      color: rgba(19, 34, 43, 0.85);
      animation: fadeUp 780ms 380ms both;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      gap: 14px;
      width: min(540px, 100%);
      justify-self: center;
      animation: fadeUp 860ms 520ms both;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-family: "Manrope", sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 220ms ease, box-shadow 220ms ease;
      color: #081015;
      isolation: isolate;
    }

    .btn::after {
      content: "";
      position: absolute;
      inset: -60% 35% auto -60%;
      height: 280%;
      transform: rotate(24deg) translateX(-190%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.76), transparent);
      transition: transform 650ms ease;
      z-index: -1;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 14px 25px rgba(19, 34, 43, 0.18);
    }

    .btn:hover::after {
      transform: rotate(24deg) translateX(290%);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-a {
      background: linear-gradient(120deg, #fb923c, #f59e0b);
    }

    .btn-b {
      background: linear-gradient(120deg, #22d3ee, #14b8a6);
    }

    @media (max-width: 640px) {
      body {
        overflow-y: auto;
      }

      .shell {
        border-radius: 22px;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .orb-a,
      .orb-b {
        opacity: 0.72;
      }
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes floatA {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(16px, 20px); }
    }

    @keyframes floatB {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-20px, -14px); }
    }

    @keyframes pulseWash {
      0%, 100% { opacity: 0.75; }
      50% { opacity: 1; }
    }

    @keyframes drift {
      from { transform: translateX(0); }
      to { transform: translateX(-46px); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="orb orb-a" aria-hidden="true"></div>
  <div class="orb orb-b" aria-hidden="true"></div>

  <main class="shell">
    <section class="content">
      <span class="eyebrow">Akshara Enterprises</span>

      <div class="actions">
        <button id="btn1" class="btn btn-a" type="button">Task Manager</button>
        <button id="btn2" class="btn btn-b" type="button">Attendance</button>
      </div>
    </section>
  </main>

  <script>
    // Replace these with your actual links.
    const link1 = "https://sprintboardfinal.vercel.app/";
    const link2 = "https://leave-management-nine-navy.vercel.app/login";

    document.getElementById("btn1").addEventListener("click", () => {
      window.location.href = link1;
    });

    document.getElementById("btn2").addEventListener("click", () => {
      window.location.href = link2;
    });
  </script>
</body>
</html>
